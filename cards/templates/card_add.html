{% extends 'base.html' %}
{% block title %}Добавить карточку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"> Добавить новую карточку</h3>
            </div>
            <div class="card-body">

                {% if errors %}
                <div class="alert alert-danger">
                    <strong>Ошибка!</strong>
                    <ul class="mb-0 mt-2">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="post" action="{% url 'card-create' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="question" class="form-label">Вопрос *</label>
                        <input type="text" class="form-control {% if errors %}is-invalid{% endif %}"
                               id="question" name="question"
                               value="{{ question|default:'' }}"
                               placeholder="Например: Что такое аминокислоты?" required>
                        <div class="form-text">Максимум 500 символов</div>
                    </div>

                    <div class="mb-3">
                        <label for="answer" class="form-label">Ответ *</label>
                        <textarea class="form-control {% if errors %}is-invalid{% endif %}"
                                  id="answer" name="answer"
                                  rows="4"
                                  placeholder="Например: Органические соединения, из которых состоят белки..." required>{{ answer|default:'' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Категория</label>
                        <select class="form-select" id="category" name="category">
                            <option value="amino_acids" {% if category == 'amino_acids' %}selected{% endif %}>Аминокислоты</option>
                            <option value="enzymes" {% if category == 'enzymes' %}selected{% endif %}>Ферменты</option>
                            <option value="metabolism" {% if category == 'metabolism' %}selected{% endif %}>Метаболизм</option>
                            <option value="vitamins" {% if category == 'vitamins' %}selected{% endif %}>Витамины</option>
                            <option value="other" {% if category == 'other' or not category %}selected{% endif %}>Другое</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'card-list' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить карточку</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
