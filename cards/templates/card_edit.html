{% extends 'base.html' %}
{% block title %}Редактировать карточку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0"> Редактировать карточку</h3>
            </div>
            <div class="card-body">

                {% if errors %}
                <div class="alert alert-danger">
                    <strong>Ошибка!</strong>
                    <ul class="mb-0 mt-2">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="post" action="{% url 'card-update' card.id %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="question" class="form-label">Вопрос *</label>
                        <input type="text" class="form-control"
                               id="question" name="question"
                               value="{{ card.question }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="answer" class="form-label">Ответ *</label>
                        <textarea class="form-control"
                                  id="answer" name="answer"
                                  rows="4" required>{{ card.answer }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Категория</label>
                        <select class="form-select" id="category" name="category">
                            <option value="amino_acids" {% if card.category == 'amino_acids' %}selected{% endif %}>Аминокислоты</option>
                            <option value="enzymes" {% if card.category == 'enzymes' %}selected{% endif %}>Ферменты</option>
                            <option value="metabolism" {% if card.category == 'metabolism' %}selected{% endif %}>Метаболизм</option>
                            <option value="vitamins" {% if card.category == 'vitamins' %}selected{% endif %}>Витамины</option>
                            <option value="other" {% if card.category == 'other' %}selected{% endif %}>Другое</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'card-list' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
